<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ATM Simulator </title>
    <link rel="stylesheet" href="./atm-style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <main class="container d-flex justify-content-center align-items-center">
        <form action="" class="w-75">
            <label for="basicOTP" class="form-label"> Enter PIN </label>
            <div class="form-otp " data-coreui-toggle="otp" data-coreui-id="basicOTP" data-coreui-name="otp"
                id="input-box">
                <input class="form-otp-control" type="number" readonly>
                <input class="form-otp-control" type="number" readonly>
                <input class="form-otp-control" type="number" readonly>
                <input class="form-otp-control" type="number" readonly>
            </div>

            <button class=" btn btn-primary mt-3" type="button" onclick="checkCorrectPin()"> Continue </button>
        </form>
         
        <div class="row gy-4 w-25 p-2 rounded-3" style="background-color: rgb(37, 12, 95);">
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(1)"> 1</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(2)">2</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(3)">3</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(4)"> 4</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(5)">5</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(6)">6</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(7)"> 7</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(8)">8</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(9)">9</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary">X</button>
            </div>
            <div class="col-4">
                <button class="btn btn-outline-primary rounded-circle" onclick="handleDialerButton(0)">0</button>
            </div>
        </div>
    </main>

    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="toast-header">
    <img src="..." class="rounded me-2" alt="...">
    <strong class="me-auto">Bootstrap</strong>
    <small>11 mins ago</small>
    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
  </div>
  <div class="toast-body">
    Hello, world! This is a toast message.
  </div>
</div>


    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
</body>
</html>
